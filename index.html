<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PX 장보기</title>
<style>
:root{
  --bg:#faf8f3;
  --bg-panel:#f0ede4;
  --border:#d8d3c5;
  --border-focus:#2e7d32;
  --text:#2c2c2c;
  --text-sub:#6b6b5e;
  --accent:#2e7d32;
  --green:#388e3c;
  --gold:#b8860b;
  --red:#c62828;
  --r:8px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Apple SD Gothic Neo','Malgun Gothic',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:24px 32px}
.wrap{max-width:1500px;margin:0 auto}

/* 헤더 */
.header{display:flex;align-items:center;gap:10px;margin-bottom:12px;background:#2e7d32;padding:14px 18px;border-radius:var(--r)}
h1{font-size:22px;font-weight:700;color:#fff}
.badge-px{background:#fff;color:#2e7d32;font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;letter-spacing:.4px}
.sub{font-size:13px;color:#fff;opacity:0.85;margin-bottom:20px}

/* 통계 */
.summary{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:18px}
.stat{background:var(--bg-panel);border-radius:var(--r);padding:14px 16px;border:1px solid var(--border)}
.stat-label{font-size:11px;color:var(--text-sub);margin-bottom:6px;font-weight:500}
.stat-val{font-size:22px;font-weight:700;color:var(--text)}

/* 툴바 */
.toolbar{display:flex;gap:8px;margin-bottom:14px;align-items:center;flex-wrap:wrap}
.toolbar input[type=text]{flex:1;min-width:140px;font-size:13px;padding:7px 12px;border:1px solid var(--border);border-radius:var(--r);outline:none;background:var(--bg-panel);color:var(--text);transition:border-color .15s}
.toolbar input[type=text]::placeholder{color:var(--text-sub)}
.toolbar input[type=text]:focus{border-color:var(--border-focus);box-shadow:0 0 0 3px rgba(46,125,50,.15)}
.toolbar select{font-size:13px;padding:7px 10px;border:1px solid var(--border);border-radius:var(--r);background:var(--bg-panel);color:var(--text);outline:none}
.btn{padding:7px 14px;font-size:13px;border:1px solid var(--border);border-radius:var(--r);background:var(--bg-panel);color:var(--text);cursor:pointer;white-space:nowrap;transition:background .15s,border-color .15s;font-weight:500}
.btn:hover{background:#e8f0e8;border-color:#a5c8a5}
.btn.primary{background:var(--accent);color:#fff;border-color:var(--accent);font-weight:600}
.btn.primary:hover{background:#1b5e20;border-color:#1b5e20}
.btn.danger{color:var(--red);border-color:#6e2222}
.btn.danger:hover{background:#2a1515;border-color:var(--red)}
.btn.sm{padding:4px 10px;font-size:12px}

/* 구매자 바 */
.person-bar{background:var(--bg-panel);border:1px solid var(--border);border-radius:var(--r);padding:12px 16px;margin-bottom:14px;display:flex;gap:12px;align-items:center;flex-wrap:wrap}
.person-bar label{font-size:12px;color:var(--text-sub);font-weight:600;white-space:nowrap}
.person-inputs{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.person-input-wrap{display:flex;align-items:center;gap:6px}
.person-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.d0{background:#58a6ff}.d1{background:#3fb950}.d2{background:#d29922}
.person-input-wrap input{font-size:13px;padding:5px 8px;border:1px solid var(--border);border-radius:6px;width:72px;outline:none;font-family:inherit;background:var(--bg);color:var(--text)}
.person-input-wrap input:focus{border-color:var(--border-focus)}

/* 추가 패널 */
.add-panel{background:var(--bg-panel);border-radius:var(--r);padding:16px;margin-bottom:14px;display:none;border:1px solid var(--border-focus)}
.add-panel.show{display:block}
.add-panel-title{font-size:13px;font-weight:600;margin-bottom:12px;color:var(--accent)}
.add-row1{display:grid;grid-template-columns:80px 1fr 80px 80px 80px 100px;gap:8px;align-items:start;margin-bottom:8px}
.add-row1 input{font-size:13px;padding:7px 10px;border:1px solid var(--border);border-radius:6px;outline:none;font-family:inherit;width:100%;background:var(--bg);color:var(--text)}
.add-row1 input:focus{border-color:var(--border-focus)}
.add-row1 input::placeholder{color:var(--text-sub)}
.add-sub{font-size:11px;color:var(--text-sub);text-align:center;margin-top:3px}
.add-photo-btn{width:80px;height:64px;border:1.5px dashed #30363d;border-radius:6px;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;font-size:11px;color:var(--text-sub);gap:3px;transition:all .15s}
.add-photo-btn:hover{border-color:var(--accent);color:var(--accent)}
.add-photo-preview{width:80px;height:64px;border-radius:6px;object-fit:cover;cursor:pointer;border:1px solid var(--border)}

/* 테이블 */
.card{background:var(--bg-panel);border-radius:var(--r);border:1px solid var(--border);overflow:hidden}
table{width:100%;border-collapse:collapse;font-size:13px;table-layout:fixed}
thead tr{background:var(--bg);border-bottom:1px solid var(--border)}
th{text-align:center;padding:10px 6px;font-weight:600;color:var(--text-sub);font-size:11px;vertical-align:bottom;line-height:1.4}
th.left{text-align:left}
td{padding:8px 6px;border-bottom:1px solid var(--border);color:var(--text);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(0,0,0,.03)}
.col-chk{width:36px}.col-no{width:36px}.col-photo{width:90px}.col-name{width:auto}
.col-p{width:100px}.col-price{width:110px}.col-note{width:150px}.col-del{width:130px}

.photo-cell{display:flex;align-items:center;justify-content:center}
.photo-thumb{width:64px;height:64px;border-radius:6px;object-fit:cover;cursor:pointer;border:1px solid var(--border);transition:transform .25s cubic-bezier(.34,1.56,.64,1),box-shadow .25s,border-color .15s;position:relative;z-index:1}
.photo-thumb:hover{transform:scale(2.8);border-color:var(--accent);box-shadow:0 8px 32px rgba(0,0,0,.3);z-index:100;border-radius:8px}
.photo-upload-btn{width:64px;height:64px;border:1.5px dashed #30363d;border-radius:6px;background:var(--bg);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text-sub);font-size:22px;line-height:1;transition:all .15s}
.photo-upload-btn:hover{border-color:var(--accent);color:var(--accent)}

/* 수량 */
.qty-wrap{display:flex;flex-direction:column;align-items:center;gap:3px}
.qty-label{font-size:10px;font-weight:600;color:#fff;padding:2px 6px;border-radius:3px;text-align:center;width:100%}
.l0{background:#1f6feb}.l1{background:#196c2e}.l2{background:#7d4e17}
input.qty-in{width:100%;font-size:13px;padding:4px;border:1px solid var(--border);border-radius:5px;background:var(--bg);color:var(--text);font-family:inherit;text-align:center;outline:none;font-weight:600}
input.qty-in:focus{border-color:var(--border-focus);box-shadow:0 0 0 2px rgba(46,125,50,.15)}
input.name-in{width:100%;font-size:13px;padding:3px 5px;border:1px solid transparent;border-radius:4px;background:transparent;color:var(--text);font-family:inherit}
input.name-in:focus{outline:none;border-color:var(--border-focus);background:rgba(46,125,50,.05)}
input.price-in{width:100%;font-size:12px;padding:3px 4px;border:1px solid transparent;border-radius:4px;background:transparent;color:var(--gold);font-family:inherit;text-align:right;font-weight:600}
input.price-in:focus{outline:none;border-color:var(--border-focus);background:rgba(46,125,50,.05)}
input.note-in{width:100%;font-size:12px;padding:3px 5px;border:1px solid transparent;border-radius:4px;background:transparent;color:var(--text-sub);font-family:inherit}
input.note-in:focus{outline:none;border-color:var(--border-focus);background:rgba(46,125,50,.05)}

/* 카테고리 필터 */
.cat-filter{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.cat-btn{padding:5px 12px;font-size:12px;border:1px solid var(--border);border-radius:20px;background:var(--bg-panel);color:var(--text-sub);cursor:pointer;transition:all .15s;font-weight:500;white-space:nowrap}
.cat-btn:hover{border-color:var(--accent);color:var(--accent);background:#e8f5e9}
.cat-btn.active{background:var(--accent);color:#fff;border-color:var(--accent);font-weight:700}

/* 카테고리 섹션 */
.section-wrap{margin-bottom:16px}
.section-header{
  display:flex;align-items:center;gap:10px;
  padding:8px 14px;
  background:var(--bg-panel);
  border:1px solid var(--border);
  border-bottom:none;
  border-radius:var(--r) var(--r) 0 0;
  cursor:pointer;user-select:none;
}
.section-header:hover{background:#e8f5e9}
.section-title{font-size:13px;font-weight:700;color:var(--text);flex:1}
.section-count{font-size:11px;color:var(--text-sub);background:var(--bg);border:1px solid var(--border);padding:1px 8px;border-radius:10px}
.section-toggle{font-size:11px;color:var(--text-sub);transition:transform .2s}
.section-toggle.collapsed{transform:rotate(-90deg)}
.section-body{border-radius:0 0 var(--r) var(--r);overflow:hidden}

/* 드래그 */
tr.dragging{opacity:.4}
tr.drag-over td{background:rgba(46,125,50,.12)!important;border-top:2px solid var(--accent)!important}
.drop-zone{
  border:2px dashed var(--border);border-radius:6px;
  padding:14px;text-align:center;
  font-size:12px;color:var(--text-sub);
  margin:4px 0;transition:all .2s;
}
.drop-zone.drag-active{border-color:var(--accent);color:var(--accent);background:rgba(46,125,50,.05)}

/* 카테고리 select (행 안) */
select.cat-in{
  font-size:11px;padding:3px 4px;
  border:1px solid transparent;border-radius:4px;
  background:transparent;color:var(--text-sub);
  font-family:inherit;cursor:pointer;outline:none;
  max-width:90px;
}
select.cat-in:hover{border-color:var(--border);background:var(--bg)}
select.cat-in:focus{border-color:var(--border-focus)}
tfoot tr td{font-weight:600;background:var(--bg);border-top:1px solid var(--border);font-size:12px;text-align:center;color:var(--text-sub)}
.checked td{opacity:0.3}
.nodata{text-align:center;padding:2.5rem;color:var(--text-sub);font-size:14px}

.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:999;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.modal-bg.show{display:flex}
.modal-img{max-width:90vw;max-height:88vh;border-radius:var(--r);object-fit:contain}
.modal-close{position:fixed;top:16px;right:20px;color:var(--text-sub);font-size:24px;cursor:pointer;z-index:1000;background:var(--bg-panel);border:1px solid var(--border);width:36px;height:36px;display:flex;align-items:center;justify-content:center;border-radius:6px;transition:all .15s}
.modal-close:hover{color:var(--text);border-color:#30363d}

::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:#b0aa98;border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:#888}
input[type=checkbox]{accent-color:var(--accent)}

@media(max-width:700px){
  .summary{grid-template-columns:repeat(2,1fr)}
  .col-price,.col-note{display:none}
}
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <h1>PX 장보기</h1>
    <span class="badge-px">화장품</span>
  </div>
  <p class="sub">사진 업로드 · 사람별 수량 · 비고 직접 입력 가능</p>

  <div class="person-bar">
    <label>구매자 이름</label>
    <div class="person-inputs">
      <div class="person-input-wrap"><div class="person-dot d0"></div><input type="text" id="pname0" value="김" oninput="updateNames()" placeholder="이름1" maxlength="6"></div>
      <div class="person-input-wrap"><div class="person-dot d1"></div><input type="text" id="pname1" value="송" oninput="updateNames()" placeholder="이름2" maxlength="6"></div>
      <div class="person-input-wrap"><div class="person-dot d2"></div><input type="text" id="pname2" value="장" oninput="updateNames()" placeholder="이름3" maxlength="6"></div>
    </div>
    <span style="font-size:12px;color:#bbb;margin-left:auto">이름을 바꾸면 표에 자동 반영돼요</span>
  </div>

  <div class="summary">
    <div class="stat"><div class="stat-label">총 항목</div><div class="stat-val" id="s-count">0</div></div>
    <div class="stat"><div class="stat-label">총 금액 (추정)</div><div class="stat-val" id="s-total">-</div></div>
    <div class="stat"><div class="stat-label">완료</div><div class="stat-val" id="s-done">0</div></div>
    <div class="stat"><div class="stat-label">미완료</div><div class="stat-val" id="s-left">0</div></div>
  </div>

  <div class="cat-filter" id="cat-filter"></div>

  <div class="toolbar">
    <input type="text" id="search" placeholder="품명 검색..." oninput="render()">
    <select id="fperson" onchange="render()">
      <option value="">전체</option>
      <option value="0" id="fopt0">김</option>
      <option value="1" id="fopt1">송</option>
      <option value="2" id="fopt2">장</option>
    </select>
    <button class="btn primary" onclick="toggleAdd()">+ 항목 추가</button>
    <button class="btn" onclick="clearDone()">완료 삭제</button>
  </div>

  <div class="add-panel" id="add-panel">
    <div class="add-panel-title">새 항목 추가</div>
    <div class="add-row1">
      <div>
        <div id="add-photo-wrap">
          <div class="add-photo-btn" onclick="document.getElementById('add-file-inp').click()">
            <span style="font-size:22px">+</span><span>사진</span>
          </div>
        </div>
        <input type="file" id="add-file-inp" accept="image/*" style="display:none" onchange="previewAdd(this)">
      </div>
      <div><input type="text" id="new-name" placeholder="품명 입력"></div>
      <div>
        <input type="number" id="new-q0" placeholder="0" min="0" style="text-align:center">
        <div class="add-sub" id="asub0">김</div>
      </div>
      <div>
        <input type="number" id="new-q1" placeholder="0" min="0" style="text-align:center">
        <div class="add-sub" id="asub1">송</div>
      </div>
      <div>
        <input type="number" id="new-q2" placeholder="0" min="0" style="text-align:center">
        <div class="add-sub" id="asub2">장</div>
      </div>
      <div><input type="number" id="new-price" placeholder="가격(원)"></div>
    </div>
    <div style="display:flex;gap:8px;margin-bottom:8px;align-items:center">
      <label style="font-size:12px;color:var(--text-sub);white-space:nowrap">카테고리</label>
      <select id="new-cat" style="font-size:13px;padding:7px 10px;border:1px solid var(--border);border-radius:6px;background:var(--bg);color:var(--text);outline:none;flex:1">
        <option value="shampoo">🧴 샴푸</option>
        <option value="sunscreen">☀️ 선크림</option>
        <option value="cleanser">🫧 클렌징폼</option>
        <option value="skincare">✨ 스킨/로션</option>
        <option value="food">🍱 식료품</option>
        <option value="alcohol">🍺 술</option>
        <option value="detergent">🧺 세제/섬유</option>
        <option value="shampoo_body">🚿 샴푸/바디</option>
        <option value="tissue">🧻 휴지/물티슈</option>
        <option value="sanitary">🩺 위생용품</option>
        <option value="icecream">🍦 아이스크림</option>
        <option value="etc" selected>📦 기타</option>
      </select>
    </div>
    <div>
      <input type="text" id="new-note" placeholder="비고 메모..." style="width:100%;font-size:13px;padding:7px 10px;border:1px solid #ddd;border-radius:8px;outline:none;font-family:inherit">
    </div>
    <div style="margin-top:10px;display:flex;gap:8px">
      <button class="btn primary" onclick="addItem()">추가</button>
      <button class="btn" onclick="toggleAdd()">취소</button>
    </div>
  </div>

  <div id="sections-wrap"></div>
</div>

<div class="modal-bg" id="modal" onclick="closeModal()">
  <span class="modal-close" onclick="closeModal()">&#x2715;</span>
  <img class="modal-img" id="modal-img" src="" alt="">
</div>

  {id:351,name:'소피 바디피트 블록맞춤 중 32P',qtys:[0,0,0],price:5720,note:'생리대',photo:null,done:false,cat:'sanitary'},
  {id:352,name:'템포 내추럴슈퍼 16P',qtys:[0,0,0],price:4300,note:'탐폰',photo:null,done:false,cat:'sanitary'}
];
let nextId = 200;
let addPhotoData = null;
let activeCat = '';   // 현재 선택된 카테고리 필터 ('' = 전체)
let dragId = null;    // 드래그 중인 item id
let collapsed = {};   // 접힌 섹션

function names(){ return [0,1,2].map(i=>(document.getElementById('pname'+i).value.trim()||'이름'+(i+1))); }

function updateNames(){
  render();
}

function previewAdd(inp){
  if(!inp.files||!inp.files[0]) return;
  const r = new FileReader();
  r.onload = e => {
    addPhotoData = e.target.result;
    document.getElementById('add-photo-wrap').innerHTML =
      `<img src="${addPhotoData}" class="add-photo-preview" onclick="document.getElementById('add-file-inp').click()" title="클릭해서 변경">`;
  };
  r.readAsDataURL(inp.files[0]);
}

/* ── 카테고리 필터 버튼 렌더 ── */
function renderCatFilter(){
  const wrap = document.getElementById('cat-filter');
  const all = `<button class="cat-btn${activeCat===''?' active':''}" onclick="setCat('')">전체</button>`;
  const btns = CATS.map(c=>{
    const cnt = items.filter(i=>i.cat===c.id).length;
    return `<button class="cat-btn${activeCat===c.id?' active':''}" onclick="setCat('${c.id}')">${c.label} <span style="opacity:.6">${cnt}</span></button>`;
  }).join('');
  wrap.innerHTML = all + btns;
}
function setCat(id){ activeCat=id; render(); }

/* ── 메인 render ── */
function render(){
  const q = (document.getElementById('search').value||'').toLowerCase();
  const fp = document.getElementById('fperson').value;
  const ns = names();
  const wrap = document.getElementById('sections-wrap');

  // 필터 적용
  const filtered = items.filter(it=>{
    const mq = !q || it.name.toLowerCase().includes(q) || (it.note||'').toLowerCase().includes(q);
    const mp = fp==='' ? true : it.qtys[+fp] > 0;
    const mc = activeCat==='' ? true : it.cat===activeCat;
    return mq && mp && mc;
  });

  // 카테고리 필터 버튼 갱신
  renderCatFilter();

  // 표시할 카테고리 목록 (해당 항목이 있는 것만)
  const visibleCats = CATS.filter(c=> filtered.some(i=>i.cat===c.id));
  const uncatItems = filtered.filter(i=>!CATS.find(c=>c.id===i.cat));
  if(uncatItems.length) visibleCats.push({id:'etc',label:'📦 기타'});

  if(!filtered.length){
    wrap.innerHTML=`<div class="card"><div class="nodata">항목이 없습니다</div></div>`;
    updateStats(); return;
  }

  wrap.innerHTML = visibleCats.map(cat=>{
    const catItems = filtered.filter(i=>i.cat===cat.id);
    if(!catItems.length) return '';
    const isCollapsed = collapsed[cat.id];
    const rows = catItems.map((it,idx)=>renderRow(it,idx,ns)).join('');
    const totalQtys = [0,1,2].map(pi=>catItems.reduce((a,i)=>a+i.qtys[pi],0));
    const priced = catItems.filter(i=>i.price!=null);
    const totalPrice = priced.length ? priced.reduce((a,i)=>a+(i.price*i.qtys.reduce((s,v)=>s+v,0)),0) : null;

    return `
    <div class="section-wrap" id="sec-${cat.id}">
      <div class="section-header" onclick="toggleSection('${cat.id}')">
        <span class="section-title">${cat.label}</span>
        <span class="section-count">${catItems.length}개</span>
        <span class="section-toggle${isCollapsed?' collapsed':''}">▼</span>
      </div>
      <div class="section-body card" style="display:${isCollapsed?'none':'block'}">
        <table>
          <thead><tr>
            <th class="col-chk"></th>
            <th class="col-no" style="color:var(--text-sub)">#</th>
            <th class="col-photo">사진</th>
            <th class="col-name left">품명</th>
            <th class="col-p">${ns[0]}<br><small style="color:var(--text-sub);font-weight:400">개수</small></th>
            <th class="col-p">${ns[1]}<br><small style="color:var(--text-sub);font-weight:400">개수</small></th>
            <th class="col-p">${ns[2]}<br><small style="color:var(--text-sub);font-weight:400">개수</small></th>
            <th class="col-price" style="text-align:right">가격(원)</th>
            <th class="col-note left">비고</th>
            <th class="col-del"></th>
          </tr></thead>
          <tbody id="tbody-${cat.id}"
            ondragover="onDragOverTbody(event,'${cat.id}')"
            ondrop="onDropTbody(event,'${cat.id}')"
            ondragleave="onDragLeaveTbody(event)"
          >${rows}</tbody>
          <tfoot><tr>
            <td colspan="4" style="text-align:right;color:var(--text-sub);font-weight:400">합계</td>
            <td style="text-align:center;font-weight:600;color:var(--text)">${totalQtys[0]}개</td>
            <td style="text-align:center;font-weight:600;color:var(--text)">${totalQtys[1]}개</td>
            <td style="text-align:center;font-weight:600;color:var(--text)">${totalQtys[2]}개</td>
            <td style="text-align:right;font-weight:600;color:var(--gold)">${totalPrice!=null?totalPrice.toLocaleString()+'원':'-'}</td>
            <td colspan="2"></td>
          </tr></tfoot>
        </table>
      </div>
    </div>`;
  }).join('');

  updateStats();
}

function renderRow(it, idx, ns){
  const photoHtml = it.photo
    ? `<img src="${it.photo}" class="photo-thumb" onclick="openModal(${it.id})" title="크게 보기">`
    : `<div class="photo-upload-btn" onclick="triggerUpload(${it.id})" title="사진 추가">+</div>`;
  const qCells = [0,1,2].map(pi=>`
    <td class="col-p"><div class="qty-wrap">
      <div class="qty-label l${pi}">${ns[pi]}</div>
      <input type="number" class="qty-in" value="${it.qtys[pi]}" min="0" onchange="setQty(${it.id},${pi},this.value)">
    </div></td>`).join('');
  const catOpts = CATS.map(c=>`<option value="${c.id}"${it.cat===c.id?' selected':''}>${c.label}</option>`).join('');

  return `<tr class="${it.done?'checked':''}" draggable="true"
    ondragstart="onDragStart(event,${it.id})"
    ondragend="onDragEnd(event)"
    ondragover="onDragOverRow(event,${it.id})"
    ondrop="onDropRow(event,${it.id})"
    id="row-${it.id}">
    <td class="col-chk"><input type="checkbox" ${it.done?'checked':''} onchange="toggleDone(${it.id})"></td>
    <td class="col-no" style="color:var(--text-sub);font-size:11px;text-align:center;cursor:grab">⠿</td>
    <td class="col-photo"><div class="photo-cell" id="pcell-${it.id}">${photoHtml}</div></td>
    <td class="col-name"><input class="name-in" type="text" value="${it.name.replace(/"/g,'&quot;')}" onchange="setField(${it.id},'name',this.value)"></td>
    ${qCells}
    <td class="col-price"><input class="price-in" type="number" value="${it.price!=null?it.price:''}" placeholder="-" onchange="setField(${it.id},'price',this.value?+this.value:null)"></td>
    <td class="col-note"><input class="note-in" type="text" value="${(it.note||'').replace(/"/g,'&quot;')}" placeholder="메모..." onchange="setField(${it.id},'note',this.value)"></td>
    <td class="col-del">
      <select class="cat-in" onchange="moveCat(${it.id},this.value)" title="카테고리 이동">${catOpts}</select>
      <button class="btn danger sm" onclick="delItem(${it.id})">삭제</button>
    </td>
  </tr>`;
}

/* ── 섹션 접기/펼치기 ── */
function toggleSection(catId){
  collapsed[catId] = !collapsed[catId];
  render();
}

/* ── 카테고리 변경 ── */
function moveCat(id, newCat){
  const it = items.find(i=>i.id===id);
  if(it){ it.cat = newCat; }
  render();
}

/* ── 드래그 앤 드롭 (행 순서 변경) ── */
function onDragStart(e, id){
  dragId = id;
  e.dataTransfer.effectAllowed = 'move';
  setTimeout(()=>{ const r=document.getElementById('row-'+id); if(r) r.classList.add('dragging'); },0);
}
function onDragEnd(e){
  document.querySelectorAll('tr.dragging').forEach(r=>r.classList.remove('dragging'));
  document.querySelectorAll('tr.drag-over').forEach(r=>r.classList.remove('drag-over'));
  dragId = null;
}
function onDragOverRow(e, id){
  e.preventDefault();
  document.querySelectorAll('tr.drag-over').forEach(r=>r.classList.remove('drag-over'));
  const r = document.getElementById('row-'+id);
  if(r && id!==dragId) r.classList.add('drag-over');
}
function onDropRow(e, targetId){
  e.preventDefault(); e.stopPropagation();
  if(dragId===null || dragId===targetId) return;
  const fromIdx = items.findIndex(i=>i.id===dragId);
  const toIdx   = items.findIndex(i=>i.id===targetId);
  if(fromIdx<0||toIdx<0) return;
  // 카테고리도 target과 맞춤
  items[fromIdx].cat = items[toIdx].cat;
  const [moved] = items.splice(fromIdx,1);
  items.splice(toIdx,0,moved);
  render();
}
function onDragOverTbody(e, catId){
  e.preventDefault();
}
function onDropTbody(e, catId){
  e.preventDefault();
  if(dragId===null) return;
  const it = items.find(i=>i.id===dragId);
  if(it && it.cat!==catId){ it.cat=catId; render(); }
}
function onDragLeaveTbody(e){
  // no-op
}

function updateStats(){
  document.getElementById('s-count').textContent = items.length;
  const priced = items.filter(i=>i.price!=null);
  document.getElementById('s-total').textContent = priced.length
    ? priced.reduce((a,i)=>a+(i.price*i.qtys.reduce((s,v)=>s+v,0)),0).toLocaleString()+'원' : '-';
  const done = items.filter(i=>i.done).length;
  document.getElementById('s-done').textContent = done;
  document.getElementById('s-left').textContent = items.length-done;
}

function triggerUpload(id){
  let inp = document.getElementById('upl-'+id);
  if(!inp){
    inp = document.createElement('input');
    inp.type='file'; inp.accept='image/*'; inp.style.display='none'; inp.id='upl-'+id;
    inp.onchange = e => doUpload(id, e.target);
    document.body.appendChild(inp);
  }
  inp.click();
}

function doUpload(id, inp){
  if(!inp.files||!inp.files[0]) return;
  const r = new FileReader();
  r.onload = e => {
    const it = items.find(i=>i.id===id);
    if(it){ it.photo=e.target.result; }
    const cell = document.getElementById('pcell-'+id);
    if(cell) cell.innerHTML=`<img src="${e.target.result}" class="photo-thumb" onclick="openModal(${id})" title="크게 보기">`;
  };
  r.readAsDataURL(inp.files[0]);
}

function openModal(id){
  const it = items.find(i=>i.id===id);
  if(!it||!it.photo) return;
  document.getElementById('modal-img').src = it.photo;
  document.getElementById('modal').classList.add('show');
}
function closeModal(){ document.getElementById('modal').classList.remove('show'); }

function toggleDone(id){
  const it=items.find(i=>i.id===id); if(it) it.done=!it.done; render();
}
function setQty(id,pi,v){
  const it=items.find(i=>i.id===id); if(it) it.qtys[pi]=v===''?0:+v; updateStats();
}
function setField(id,f,v){
  const it=items.find(i=>i.id===id); if(it) it[f]=v; updateStats();
}
function delItem(id){ items=items.filter(i=>i.id!==id); render(); }

function toggleAdd(){
  const el=document.getElementById('add-panel');
  el.classList.toggle('show');
  if(el.classList.contains('show')) document.getElementById('new-name').focus();
}

function addItem(){
  const name=document.getElementById('new-name').value.trim();
  if(!name) return;
  const qtys=[0,1,2].map(i=>{ const v=document.getElementById('new-q'+i).value; return v===''?0:+v; });
  const price=document.getElementById('new-price').value?+document.getElementById('new-price').value:null;
  const note=document.getElementById('new-note').value.trim();
  const cat=document.getElementById('new-cat').value||'etc';
  items.push({id:nextId++,name,qtys,price,note,photo:addPhotoData,done:false,cat});
  ['new-name','new-q0','new-q1','new-q2','new-price','new-note'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('new-cat').value='etc';
  addPhotoData=null;
  document.getElementById('add-photo-wrap').innerHTML=`<div class="add-photo-btn" onclick="document.getElementById('add-file-inp').click()"><span style="font-size:22px">+</span><span>사진</span></div>`;
  document.getElementById('add-file-inp').value='';
  render();
}

function clearDone(){ items=items.filter(i=>!i.done); render(); }

render();
</script>
</body>
</html>
